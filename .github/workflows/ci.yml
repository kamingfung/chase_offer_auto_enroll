name: CI

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

permissions:
    contents: read

jobs:
    check:
        name: Lint, Format & Test
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [18, 20]

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Check formatting
              run: npx prettier --check "*.js" "*.json" "*.html"

            - name: Lint
              run: npx eslint *.js

            - name: Run tests
              run: npx jest --ci --coverage

            - name: Validate manifest
              run: |
                  node -e "
                    const m = require('./manifest.json');
                    const required = ['manifest_version', 'name', 'version', 'permissions', 'action'];
                    const missing = required.filter(k => !m[k]);
                    if (missing.length) { console.error('Missing keys:', missing); process.exit(1); }
                    console.log('✓ manifest.json valid');
                  "

    package:
        name: Package Extension
        runs-on: ubuntu-latest
        needs: check
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Build zip artifact
              run: |
                  version=$(node -p "require('./manifest.json').version")
                  zip -r "chase-offer-adder-v${version}.zip" \
                    manifest.json popup.html popup.js popup.css images/ \
                    -x "*.DS_Store"

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: extension-package
                  path: chase-offer-adder-v*.zip
                  retention-days: 30
